<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Daniela Malqui</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --forest: #1a2e1a;
    --plum: #5b3a7e;
    --cream: #f5f0e8;
    --warm-white: #faf8f4;
    --text-dark: #1a1a1a;
    --text-mid: #444;
    --text-light: #777;
    --border: rgba(26,46,26,0.12);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; background: var(--warm-white); color: var(--text-dark); }

  nav {
    position: fixed; top: 0; width: 100%; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.2rem 3rem;
    background: rgba(250,248,244,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 600; color: var(--forest); text-decoration: none; }
  .nav-back { font-size: 0.82rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-mid); text-decoration: none; }
  .nav-back:hover { color: var(--forest); }

  .article-hero {
    padding-top: 80px;
    background: var(--forest);
    min-height: 340px;
    display: flex; align-items: flex-end;
  }
  .article-hero-inner {
    max-width: 780px; margin: 0 auto; padding: 3rem;
    width: 100%;
  }
  .article-tag {
    display: inline-block; background: var(--plum); color: white;
    font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase;
    padding: 0.35rem 0.8rem; margin-bottom: 1.2rem; border-radius: 2px;
  }
  .article-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 300; line-height: 1.15; color: white;
    margin-bottom: 1rem;
  }
  .article-meta { font-size: 0.82rem; color: rgba(255,255,255,0.45); letter-spacing: 0.05em; }

  .article-image {
    width: 100%; max-height: 420px; overflow: hidden;
  }
  .article-image img { width: 100%; height: 420px; object-fit: cover; }

  .article-body {
    max-width: 780px; margin: 0 auto; padding: 3rem;
  }

  /* Style the Google Doc content */
  .article-body h1 { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 400; color: var(--forest); margin: 2rem 0 1rem; display: none; }
  .article-body h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 400; color: var(--forest); margin: 2.5rem 0 1rem; }
  .article-body h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 400; color: var(--forest); margin: 2rem 0 0.8rem; }
  .article-body p { font-size: 1.05rem; line-height: 1.9; color: var(--text-mid); margin-bottom: 1.4rem; }
  .article-body hr { border: none; border-top: 1px solid var(--border); margin: 2.5rem 0; }
  .article-body ul, .article-body ol { margin: 1rem 0 1.5rem 1.5rem; }
  .article-body li { font-size: 1rem; line-height: 1.8; color: var(--text-mid); margin-bottom: 0.4rem; }
  .article-body strong { color: var(--text-dark); font-weight: 500; }
  .article-body em { font-style: italic; }
  .article-body blockquote {
    border-left: 3px solid var(--plum);
    padding-left: 1.5rem; margin: 2rem 0;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem; font-style: italic; color: var(--forest);
    line-height: 1.6;
  }

  .loading-state {
    text-align: center; padding: 4rem 2rem;
    color: var(--text-light); font-style: italic;
  }

  .subscribe-strip {
    background: var(--forest); padding: 4rem 3rem; text-align: center; margin-top: 4rem;
  }
  .subscribe-strip h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem; font-weight: 300; color: white; margin-bottom: 0.8rem;
  }
  .subscribe-strip p { color: rgba(255,255,255,0.55); margin-bottom: 1.5rem; font-size: 0.95rem; }
  .btn-wa {
    display: inline-block; background: white; color: var(--forest);
    padding: 0.85rem 2rem; font-size: 0.82rem; letter-spacing: 0.1em;
    text-transform: uppercase; text-decoration: none; border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-sub {
    display: inline-block; background: var(--plum); color: white;
    padding: 0.85rem 2rem; font-size: 0.82rem; letter-spacing: 0.1em;
    text-transform: uppercase; text-decoration: none; border-radius: 2px;
    font-family: 'DM Sans', sans-serif; margin-left: 1rem;
  }

  footer {
    background: var(--forest); padding: 2rem 3rem;
    display: flex; justify-content: space-between; align-items: center;
    border-top: 1px solid rgba(255,255,255,0.08);
    flex-wrap: wrap; gap: 1rem;
  }
  .footer-name { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: white; }
  .footer-copy { font-size: 0.75rem; color: rgba(255,255,255,0.25); }

  /* WhatsApp float */
  .wa-float {
    position: fixed; bottom: 2rem; right: 2rem; z-index: 999;
    background: #25D366; color: white; border-radius: 50%;
    width: 56px; height: 56px; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2); text-decoration: none;
    font-size: 1.6rem; transition: transform 0.2s;
  }
  .wa-float:hover { transform: scale(1.1); }

  @media (max-width: 768px) {
    nav { padding: 1rem 1.5rem; }
    .article-hero-inner { padding: 2rem 1.5rem; }
    .article-body { padding: 2rem 1.5rem; }
    footer { padding: 1.5rem; flex-direction: column; text-align: center; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Daniela Malqui</a>
  <a href="index.html#blog" class="nav-back">← Volver al blog</a>
</nav>

<div id="article-hero" class="article-hero">
  <div class="article-hero-inner">
    <span class="article-tag">El Humano Aumentado</span>
    <h1 class="article-title" id="article-title">Cargando...</h1>
    <p class="article-meta" id="article-meta"></p>
  </div>
</div>

<div id="article-image-wrap" class="article-image" style="display:none;">
  <img id="article-image" src="" alt="">
</div>

<div class="article-body" id="article-body">
  <div class="loading-state">Cargando artículo...</div>
</div>

<div class="subscribe-strip">
  <h3>¿Te gustó este artículo?</h3>
  <p>Suscribite al newsletter y recibí cada nueva idea directamente en tu inbox.</p>
  <a href="https://elhumanoaumentado.substack.com" target="_blank" class="btn-sub">Suscribirme</a>
  <a href="https://wa.me/525536736502?text=Hola%20Daniela%2C%20me%20interesa%20contratarte%20como%20speaker" target="_blank" class="btn-wa">Contratar a Daniela</a>
</div>

<footer>
  <span class="footer-name">Daniela Malqui</span>
  <span class="footer-copy">© 2025 Daniela Malqui</span>
</footer>

<a href="https://wa.me/525536736502?text=Hola%20Daniela%2C%20me%20interesa%20contratarte%20como%20speaker" target="_blank" class="wa-float">💬</a>

<script>
async function loadArticle() {
  const params = new URLSearchParams(window.location.search);
  const docUrl = params.get('doc');
  const titulo = params.get('titulo') ? decodeURIComponent(params.get('titulo')) : '';

  if (titulo) {
    document.getElementById('article-title').textContent = titulo;
    document.title = titulo + ' — Daniela Malqui';
  }

  if (!docUrl) {
    document.getElementById('article-body').innerHTML = '<p style="color:var(--text-light);">Artículo no encontrado.</p>';
    return;
  }

  try {
    const res = await fetch(decodeURIComponent(docUrl));
    const html = await res.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, 'text/html');

    // Get main content — Google Docs publishes inside #contents or body
    const content = doc.querySelector('#contents') || doc.querySelector('body');

    // Remove Google Docs header/footer noise
    const toRemove = content.querySelectorAll('script, style, .doc-content > p:first-child, a[href*="abuse"], a[href*="support.google"]');
    toRemove.forEach(el => el.remove());

    // Get title from h1 if present
    const h1 = content.querySelector('h1');
    if (h1 && !titulo) {
      document.getElementById('article-title').textContent = h1.textContent;
      document.title = h1.textContent + ' — Daniela Malqui';
    }

    // Clean up Google Docs specific styles but keep structure
    const allEls = content.querySelectorAll('*');
    allEls.forEach(el => {
      el.removeAttribute('style');
      el.removeAttribute('class');
      el.removeAttribute('id');
    });

    document.getElementById('article-body').innerHTML = content.innerHTML;

    // Show image if available
    const imgUrl = params.get('img');
    if (imgUrl) {
      document.getElementById('article-image').src = decodeURIComponent(imgUrl);
      document.getElementById('article-image-wrap').style.display = 'block';
    }

  } catch(e) {
    document.getElementById('article-body').innerHTML = '<p style="color:var(--text-light);">No se pudo cargar el artículo. <a href="https://elhumanoaumentado.substack.com" target="_blank">Leerlo en Substack →</a></p>';
  }
}

loadArticle();
</script>

</body>
</html>
